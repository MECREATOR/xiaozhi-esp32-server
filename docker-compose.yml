services:
  redis:
    image: redis:7-alpine
    container_name: xiaozhi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - xiaozhi-network

  celery-worker:
    image: python:3.10-slim
    container_name: xiaozhi-celery-worker
    command: >
      sh -c "pip install celery redis -q &&
             celery -A celery_app worker --broker=redis://redis:6379/0 --loglevel=info || sleep infinity"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - xiaozhi-network

networks:
  xiaozhi-network:
    driver: bridge

volumes:
  redis-data:

